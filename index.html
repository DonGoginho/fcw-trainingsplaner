<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCW Trainingsplaner</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="img/FCW_logo.png">
  <meta name="theme-color" content="#2268B2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="refresh" content="0;url=d7b-2026-2027/index.html">
  <style>
    .team-select {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 16px;
    }

    .team-select-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      padding-left: 2px;
    }

    .team-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--fcw-weiss);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      border-left: 5px solid var(--fcw-blau);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .team-card:active {
      transform: scale(0.98);
    }

    .team-card:hover {
      box-shadow: 0 4px 16px rgba(34, 104, 178, 0.18);
    }

    .team-card-icon {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      background: var(--fcw-blau);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fcw-weiss);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .team-card-content {
      flex: 1;
      min-width: 0;
    }

    .team-card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--fcw-dunkel);
      line-height: 1.3;
    }

    .team-card-meta {
      font-size: 0.82rem;
      color: #888;
      margin-top: 3px;
    }

    .team-card-arrow {
      flex-shrink: 0;
      color: var(--fcw-blau);
      font-size: 1.3rem;
      opacity: 0.5;
    }

    @media (min-width: 600px) {
      .team-select {
        padding: 32px 20px 20px;
      }

      .team-card {
        padding: 24px;
      }

      .team-card-icon {
        width: 60px;
        height: 60px;
        font-size: 1.2rem;
      }

      .team-card-name {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <img src="img/FCW_logo.png" alt="FC Wiedikon Logo">
    <h1>Trainingsplaner<small>FC Wiedikon</small></h1>
  </header>

  <div class="team-select">
    <p class="team-select-title">Team wählen</p>

    <a class="team-card" href="d7b-2026-2027/index.html">
      <div class="team-card-icon">D7b</div>
      <div class="team-card-content">
        <div class="team-card-name">D7b-Junioren</div>
        <div class="team-card-meta">Saison 2026/2027</div>
      </div>
      <div class="team-card-arrow">›</div>
    </a>

    <a class="team-card" href="e2-2025-2026/index.html">
      <div class="team-card-icon">E2</div>
      <div class="team-card-content">
        <div class="team-card-name">E2-Junioren</div>
        <div class="team-card-meta">Saison 2025/2026</div>
      </div>
      <div class="team-card-arrow">›</div>
    </a>
  </div>

  <footer class="footer">
    FC Wiedikon &middot; Trainingsplaner
  </footer>

</body>
</html>
